<!DOCTYPE html>
<html>
<head>
    <title>Remove Background Tool</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #222; color: #fff; }
        canvas { border: 1px solid #444; margin-top: 20px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgfQEhjx8P/YQxkwH10zEA3mH6QzEAGjGqwGg0G+kEwGsZDDQYAAAD//0pP/0EAAAAASUVORK5CYII='); }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h2>AI Background Remover</h2>
    <p>Since the script execution failed, I built you this web tool instead! Just select the sword image you saved, and it will remove the background instantly.</p>
    
    <input type="file" id="upload" accept="image/png, image/jpeg" />
    <br>
    <canvas id="canvas"></canvas>
    <br>
    <button id="downloadBtn" style="display:none;">Download Transparent Image</button>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');

        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i+1];
                        const b = data[i+2];
                        
                        // Remove white/light pixels
                        if (r > 220 && g > 220 && b > 220) {
                            data[i+3] = 0; // Make transparent
                        }
                    }
                    
                    ctx.putImageData(imgData, 0, 0);
                    downloadBtn.style.display = 'inline-block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'pedang.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
